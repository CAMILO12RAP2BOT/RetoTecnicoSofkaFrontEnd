webdriver.driver=chrome
webdriver.chrome.driver.download.path=webdrivers
webdriver.timeouts.implicitlywait = 10000
webdriver.timeouts.fluentwait = 30000

# Serenity BDD Configuration
serenity.project.name=Open Cart Abstracta
feature.file.encoding=utf-8
serenity.test.root=com.sofka.stepdefinitions
serenity.reports.show.pie.charts=true
serenity.take.screenshots=AFTER_EACH_STEP
chrome.switches=--start-maximized;--test-type;--no-sandbox;--disable-dev-shm-usage;--ignore-certificate-errors;--disable-popup-blocking;--disable-default-apps;--disable-extensions-file-access-check;--incognito;--disable-infobars,--disable-gpu

# Cucumber Configuration
cucumber.publish.quiet=true

